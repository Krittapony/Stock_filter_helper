<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive — Daily Stock Screener</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
  :root {
    --bg: #fafaf7; --surface: #ffffff; --surface-2: #f4f3ee;
    --text: #1a1a17; --text-2: #5f5e5a; --text-3: #888780;
    --border: rgba(0,0,0,0.08); --accent: #185FA5; --accent-bg: #E6F1FB;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a17; --surface: #242420; --surface-2: #2c2c28;
      --text: #f4f3ee; --text-2: #b4b2a9; --text-3: #888780;
      --border: rgba(255,255,255,0.1); --accent: #85B7EB;
      --accent-bg: rgba(133,183,235,0.1);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", "Noto Sans Thai", sans-serif;
    background: var(--bg); color: var(--text); padding: 24px 16px; line-height: 1.6;
  }
  .container { max-width: 800px; margin: 0 auto; }
  header {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 12px; padding: 20px 24px; margin-bottom: 16px;
  }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .meta { font-size: 13px; color: var(--text-2); }
  .back-link {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--accent); text-decoration: none;
    font-size: 13px; margin-bottom: 12px;
  }
  .archive-list {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: 12px; overflow: hidden;
  }
  .archive-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 20px; border-bottom: 0.5px solid var(--border);
    text-decoration: none; color: var(--text);
  }
  .archive-item:last-child { border-bottom: none; }
  .archive-item:hover { background: var(--surface-2); }
  .archive-date { font-weight: 500; }
  .archive-picks { font-size: 12px; color: var(--text-2); margin-top: 2px; }
  .empty { padding: 40px 20px; text-align: center; color: var(--text-2); font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="../"><i class="ti ti-arrow-left"></i> Back to today</a>
  <header>
    <h1>Archive</h1>
    <div class="meta">รายงานย้อนหลัง</div>
  </header>
  <div class="archive-list" id="archive-list"></div>
</div>
<script>
fetch('index.json')
  .then(r => r.json())
  .then(data => {
    const list = document.getElementById('archive-list');
    if (!data.reports || data.reports.length === 0) {
      list.innerHTML = '<div class="empty">ยังไม่มีรายงานย้อนหลัง</div>';
      return;
    }
    data.reports.sort((a, b) => b.date.localeCompare(a.date));
    list.innerHTML = data.reports.map(r => `
      <a class="archive-item" href="${r.url}">
        <div>
          <div class="archive-date">${r.date}</div>
          <div class="archive-picks">${(r.topPicks || []).slice(0, 5).join(', ')}${r.topPicks && r.topPicks.length > 5 ? '...' : ''}</div>
        </div>
        <div style="color: var(--text-3);">→</div>
      </a>
    `).join('');
  })
  .catch(() => {
    document.getElementById('archive-list').innerHTML = '<div class="empty">ยังไม่มีรายงานย้อนหลัง</div>';
  });
</script>
</body>
</html>
